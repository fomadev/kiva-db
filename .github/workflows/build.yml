name: Multi-Architecture Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

env:
  # Force Node 24 pour supprimer les warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Windows ---
          - os: windows-latest
            arch: x64
            output: kivadb_win_x64.exe
          - os: windows-latest
            arch: x86
            output: kivadb_win_x86.exe

          # --- macOS ---
          - os: macos-latest 
            arch: arm64
            output: kivadb_mac_arm64

          # --- Linux ---
          - os: ubuntu-latest
            arch: x64
            output: kivadb_linux_x64
          - os: ubuntu-latest
            arch: arm64
            output: kivadb_linux_arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC (Windows x86)
        if: matrix.os == 'windows-latest' && matrix.arch == 'x86'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Install ARM Cross-Compiler (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Compile KivaDB
        shell: bash
        run: |
          # MSYS_NO_PATHCONV=1 empêche Bash de transformer /Iinclude en chemin C:/...
          export MSYS_NO_PATHCONV=1

          if [[ "${{ matrix.os }}" == "windows-latest" && "${{ matrix.arch }}" == "x86" ]]; then
            cl.exe /Iinclude "src/core/storage.c" "src/core/index.c" "src/core/transaction.c" "src/cli/main.c" /Fe:${{ matrix.output }}
          
          elif [[ "${{ matrix.os }}" == "ubuntu-latest" && "${{ matrix.arch }}" == "arm64" ]]; then
            aarch64-linux-gnu-gcc -Wall -Wextra -std=c11 -Iinclude src/core/*.c src/cli/main.c -o ${{ matrix.output }}
          
          else
            gcc -Wall -Wextra -std=c11 -Iinclude src/core/*.c src/cli/main.c -o ${{ matrix.output }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kivadb-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ matrix.output }}